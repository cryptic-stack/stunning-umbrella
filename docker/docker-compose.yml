services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      API_PORT: "8080"
      DATABASE_URL: host=postgres user=cis password=cis dbname=cisdb port=5432 sslmode=disable
      REDIS_ADDR: redis:6379
      UPLOAD_DIR: /data/uploads
      EXPORT_DIR: /data/exports
      CIS_BENCH_TESTING_ENABLED: "true"
      CIS_BENCH_DOWNLOAD_DIR: /data/downloads/cis-bench
      FRONTEND_URL: http://localhost
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - app_data:/data
    depends_on:
      - postgres
      - redis

  parser:
    build:
      context: .
      dockerfile: docker/Dockerfile.parser
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: cisdb
      POSTGRES_USER: cis
      POSTGRES_PASSWORD: cis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      UPLOAD_DIR: /data/uploads
    volumes:
      - app_data:/data
    depends_on:
      - postgres
      - redis

  diff-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.diff
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: cisdb
      POSTGRES_USER: cis
      POSTGRES_PASSWORD: cis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      EXPORT_DIR: /data/exports
    volumes:
      - app_data:/data
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cis
      POSTGRES_PASSWORD: cis
      POSTGRES_DB: cisdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
  redis:
    image: redis:7

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "127.0.0.1:80:3000"
      - "127.0.0.1:443:3000"
    depends_on:
      - api

  collector:
    build:
      context: .
      dockerfile: docker/Dockerfile.collector
    environment:
      DATABASE_URL: host=postgres user=cis password=cis dbname=cisdb port=5432 sslmode=disable
      DOWNLOAD_DIR: /data/downloads
      CIS_INDEX_URLS: https://www.cisecurity.org/cis-benchmarks
      COLLECTOR_SCHEDULE: "@every 24h"
    volumes:
      - app_data:/data
    depends_on:
      - postgres
    profiles:
      - collector

volumes:
  app_data:
  postgres_data:
