services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      API_PORT: "8080"
      DATABASE_URL: host=postgres user=cis password=cis dbname=cisdb port=5432 sslmode=disable
      REDIS_ADDR: redis:6379
      UPLOAD_DIR: /data/uploads
      EXPORT_DIR: /data/exports
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      AUTH_BOOTSTRAP_ADMIN_EMAIL: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,https://localhost,https://127.0.0.1}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-20971520}
      CIS_BENCH_ENABLED: "true"
      CIS_BENCH_ALLOW_BROWSER_EXTRACTION: "false"
      CIS_BENCH_DOWNLOAD_DIR: /data/downloads/cis-bench
      FRONTEND_URL: http://localhost
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - app_data:/data
    depends_on:
      - postgres
      - redis

  parser:
    build:
      context: .
      dockerfile: docker/Dockerfile.parser
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: cisdb
      POSTGRES_USER: cis
      POSTGRES_PASSWORD: cis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      UPLOAD_DIR: /data/uploads
    volumes:
      - app_data:/data
    depends_on:
      - postgres
      - redis

  diff-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.diff
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: cisdb
      POSTGRES_USER: cis
      POSTGRES_PASSWORD: cis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      EXPORT_DIR: /data/exports
    volumes:
      - app_data:/data
    depends_on:
      - postgres
      - redis

  gpo-assessment:
    build:
      context: .
      dockerfile: docker/Dockerfile.gpo
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: cisdb
      POSTGRES_USER: cis
      POSTGRES_PASSWORD: cis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      EXPORT_DIR: /data/exports
      GPO_QUEUE_NAME: gpo_jobs
    volumes:
      - app_data:/data
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cis
      POSTGRES_PASSWORD: cis
      POSTGRES_DB: cisdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
  redis:
    image: redis:7

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "127.0.0.1:80:3000"
      - "127.0.0.1:443:3000"
    depends_on:
      - api

  collector:
    build:
      context: .
      dockerfile: docker/Dockerfile.collector
    environment:
      DATABASE_URL: host=postgres user=cis password=cis dbname=cisdb port=5432 sslmode=disable
      DOWNLOAD_DIR: /data/downloads
      CIS_INDEX_URLS: https://www.cisecurity.org/cis-benchmarks
      COLLECTOR_SCHEDULE: "@every 24h"
      COLLECTOR_MAX_DOWNLOAD_BYTES: ${COLLECTOR_MAX_DOWNLOAD_BYTES:-52428800}
    volumes:
      - app_data:/data
    depends_on:
      - postgres
    profiles:
      - collector

volumes:
  app_data:
  postgres_data:
