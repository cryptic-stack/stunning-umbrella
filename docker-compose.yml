services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      API_PORT: "8080"
      DATABASE_URL: host=postgres user=cis password=cis dbname=cisdb port=5432 sslmode=disable
      REDIS_ADDR: redis:6379
      UPLOAD_DIR: /data/uploads
      EXPORT_DIR: /data/exports
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    depends_on:
      - postgres
      - redis

  parser:
    build:
      context: .
      dockerfile: docker/Dockerfile.parser
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: cisdb
      POSTGRES_USER: cis
      POSTGRES_PASSWORD: cis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./data:/data
    depends_on:
      - postgres
      - redis

  diff-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.diff
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: cisdb
      POSTGRES_USER: cis
      POSTGRES_PASSWORD: cis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      EXPORT_DIR: /data/exports
    volumes:
      - ./data:/data
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cis
      POSTGRES_PASSWORD: cis
      POSTGRES_DB: cisdb
    volumes:
      - ./storage/postgres/data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

  collector:
    build:
      context: .
      dockerfile: docker/Dockerfile.collector
    environment:
      DATABASE_URL: host=postgres user=cis password=cis dbname=cisdb port=5432 sslmode=disable
      DOWNLOAD_DIR: /data/downloads
      CIS_INDEX_URLS: https://www.cisecurity.org/cis-benchmarks
      COLLECTOR_SCHEDULE: "@every 24h"
    volumes:
      - ./data:/data
    depends_on:
      - postgres
    profiles:
      - collector
